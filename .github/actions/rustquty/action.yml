name: "rustquty"
description: "Local-first quality scanner for Rust projects"
author: "rustquty"

inputs:
  version:
    description: "rustquty version to install (default: latest)"
    required: false
    default: "latest"
  profile:
    description: "Quality scan profile (fast|full|deep)"
    required: false
    default: "full"
  project-dir:
    description: "Path to Cargo workspace"
    required: false
    default: "${{ github.workspace }}"
  rustquty-toml:
    description: "Path to rustquty.toml config file"
    required: false
  artifact-name:
    description: "Name for the failure artifact"
    required: false
    default: "rustquty-quality-report"

runs:
  using: "composite"
  steps:
    - name: Install rustquty
      shell: bash
      run: |
        if [ "${{ inputs.version }}" = "latest" ]; then
          cargo install rustquty
        else
          cargo install rustquty --version "${{ inputs.version }}"
        fi

    - name: Install cargo-nextest
      if: runner.os == 'Linux'
      shell: bash
      run: |
        if ! command -v cargo-nextest &> /dev/null; then
          cargo install cargo-nextest --locked
        fi

    - name: Install cargo-llvm-cov
      if: runner.os == 'Linux'
      shell: bash
      run: |
        if ! command -v cargo-llvm-cov &> /dev/null; then
          cargo install cargo-llvm-cov --locked
        fi

    - name: Install cargo-deny
      if: runner.os == 'Linux'
      shell: bash
      run: |
        if ! command -v cargo-deny &> /dev/null; then
          cargo install cargo-deny --locked
        fi

    - name: Install cargo-audit
      if: runner.os == 'Linux'
      shell: bash
      run: |
        if ! command -v cargo-audit &> /dev/null; then
          cargo install cargo-audit --locked
        fi

    - name: Install cargo-hack
      if: runner.os == 'Linux'
      shell: bash
      run: |
        if ! command -v cargo-hack &> /dev/null; then
          cargo install cargo-hack --locked
        fi

    - name: Install cargo-mutants
      if: runner.os == 'Linux'
      shell: bash
      run: |
        if ! command -v cargo-mutants &> /dev/null; then
          cargo install cargo-mutants --locked
        fi

    - name: Run rustquty qa
      shell: bash
      working-directory: ${{ inputs.project-dir }}
      run: |
        ARGS="qa --profile ${{ inputs.profile }} --json"
        if [ -n "${{ inputs.rustquty-toml }}" ]; then
          # Copy config to project dir if specified
          cp "${{ inputs.rustquty-toml }}" "${{ inputs.project-dir }}/rustquty.toml"
        fi
        rustquty $ARGS || RUSTQUTY_EXIT=$? || RUSTQUTY_EXIT=$?

        # Always upload artifacts, even on failure
        if [ -d "${{ inputs.project-dir }}/quality" ]; then
          echo "Uploading quality artifacts..."
          for f in "${{ inputs.project-dir }}"/quality/*.json; do
            if [ -f "$f" ]; then
              echo "  $(basename $f)"
            fi
          done
        fi

        # Re-throw exit code
        if [ "${RUSTQUTY_EXIT:-0}" -ne 0 ]; then
          echo "rustquty failed with exit code ${RUSTQUTY_EXIT}"
          # Upload artifacts before exiting
          echo "artifact_name=${{ inputs.artifact-name }}" >> $GITHUB_OUTPUT
          echo "artifact_path=${{ inputs.project-dir }}/quality" >> $GITHUB_OUTPUT
          exit ${RUSTQUTY_EXIT}
        fi

    - name: Upload quality artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ inputs.project-dir }}/quality/*.json
        retention-days: 30

branding:
  icon: "check-circle"
  color: "green"